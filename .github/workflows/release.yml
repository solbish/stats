name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Archive
        run: |
          xcodebuild -scheme Stats -configuration Release archive \
            -archivePath build/Stats.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R build/Stats.xcarchive/Products/Applications/Stats.app build/dmg/
          hdiutil create -volname "Stats" -srcfolder build/dmg \
            -ov -format UDZO build/Stats.dmg

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Stats ${{ steps.version.outputs.VERSION }}
          files: build/Stats.dmg
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
